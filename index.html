<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPA-NET Terminal v.2.1</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #0000AA;
        color: #FFFFFF;
        font-family: 'Courier New', monospace;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    #terminal {
        width: 100vw;
        height: 100vh;
        background: #0000AA;
        border: none;
        padding: 30px 25px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    #output {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 18px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-wrap: break-word;
    }
    #input-line {
        display: flex;
        align-items: center;
        margin-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.2);
        padding-top: 12px;
    }
    #prompt {
        color: #FFFFFF;
        font-weight: bold;
        margin-right: 10px;
        font-size: 18px;
    }
    #command-input {
        background: transparent;
        border: none;
        color: #FFFFFF;
        font-family: 'Courier New', monospace;
        font-size: 18px;
        flex: 1;
        outline: none;
        caret-color: transparent;
    }
    #cursor {
        display: inline-block;
        width: 12px;
        height: 22px;
        background: #FFFFFF;
        margin-left: 2px;
        animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    #terminal::-webkit-scrollbar {
        width: 8px;
        background: #0000AA;
    }
    #terminal::-webkit-scrollbar-thumb {
        background: #FFFFFF;
        border: 1px solid #0000AA;
    }

    .system-msg {
        color: #88CCFF;
        opacity: 0.9;
    }
    .error-msg {
        color: #FF6666;
    }
    .command-output {
        color: #FFFFFF;
    }
    .welcome {
        color: #FFFFFF;
        font-weight: bold;
    }

</style>
<body>
    <div id="terminal">
        <div id="output">

        </div>
        <div id="input-line">
            <span id="prompt">❯</span>
            <input type="text" id="command-input" autofocus>
            <span id="cursor"></span>
        </div>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const inputField = document.getElementById('command-input');
        const terminal = document.getElementById('terminal');

        let commandHistory = [];
        let historyIndex = -1;

        function typeText(text, className = '', speed = 30, callback = null) {
    return new Promise((resolve) => {
        const line = document.createElement('div');
        if (className) line.className = className;

        if (Array.isArray(text)) {
            text = text.join('\n');
        }

        const lines = text.split('\n');

        let lineIndex = 0;

        function typeLine() {
            if (lineIndex >= lines.length) {
                if (callback) callback();
                resolve();
                return;
            }

            const currentText = lines[lineIndex];
            const newLine = document.createElement('div');
            if (className) newLine.className = className;
            output.appendChild(newLine);
            terminal.scrollTop = terminal.scrollHeight;

            let charIndex = 0;

            function typeChar() {
                if (charIndex < currentText.length) {
                    newLine.textContent += currentText.charAt(charIndex);
                    charIndex++;
                    terminal.scrollTop = terminal.scrollHeight;
                    setTimeout(typeChar, speed);
                } else {
                    lineIndex++;
                    setTimeout(typeLine, 50);
                }
            }

            typeChar();
        }

        typeLine();
    });
}

        function addLine(text, className = '') {
            const line = document.createElement('div');
            line.textContent = text;
            if (className) line.className = className;
            output.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function handleCommand(cmd) {
            const trimmed = cmd.trim();
            if (!trimmed) return;

            commandHistory.push(trimmed);
            historyIndex = commandHistory.length;

            addLine(`❯ ${trimmed}`, 'command-output');

            const parts = trimmed.split(' ');
            const command = parts[0].toLowerCase();
            const args = parts.slice(1);

            switch(command) {
                case 'help':
case '/help':
    await typeText(
        "ДОСТУПНЫЕ КОМАНДЫ:\n" +
        "\n" +
        "  /help          — показать эту справку\n" +
        "  /clear         — очистить экран\n" +
        "  /date          — текущая дата и время\n" +
        "  /whoami        — узнать текущего пользователя\n" +
        "  /ping          — проверить соединение\n" +
        "  /say [текст]   — повторить текст\n" +
        "  /calc [выраж.] — вычислить (2+2, 5*3, и т.д.)\n" +
        "  /surf [запрос] — поискать статью в Википедии\n" +
        "  /matrix        — запустить матричный дождь (бонус)\n" +
        "  /exit          — выйти из терминала"
    , 'system-msg', 25);
    break;

                case 'clear':
                case '/clear':
                    output.innerHTML = '';
                    break;

                case 'date':
                case '/date':
                    const now = new Date();
                    await typeText(`SISTEM TYME: ${now.toLocaleString('ru-RU')}`, 'system-msg', 35);
                    break;

                case 'whoami':
                case '/whoami':
                    await typeText('USER: root@arpa-net', 'system-msg', 40);
                    await typeText('STATUS: Autorization (access level 9)', 'system-msg', 40);
                    break;

                case 'ping':
            case '/ping':
                await typeText('ОТВЕТ ОТ 127.0.0.1: байт=32 time<1мс TTL=128', 'system-msg', 20);
                await typeText('ОТВЕТ ОТ 127.0.0.1: байт=32 time<1мс TTL=128', 'system-msg', 20);
                await typeText('ОТВЕТ ОТ 127.0.0.1: байт=32 time<1мс TTL=128', 'system-msg', 20);
                await typeText('Статистика: loss = 0%', 'system-msg', 25);
                break;

            case 'say':
            case '/say':
                if (args.length === 0) {
                    await typeText('ERROR: Укажите текст для повторения', 'error-msg', 30);
                } else {
                    await typeText(args.join(' '), 'command-output', 40);
                }
                break;

            case 'calc':
            case '/calc':
                if (args.length === 0) {
                    await typeText('ERROR: Введите выражение (for example: 2+2, 5*3, 10/2)', 'error-msg', 30);
                } else {
                    try {
                        const expr = args.join(' ');
                        const sanitized = expr.replace(/[^0-9+\-*/().]/g, '');
                        const result = Function(`"use strict"; return (${sanitized})`)();
                        await typeText(`RESULT: ${expr} = ${result}`, 'system-msg', 30);
                    } catch(e) {
                        await typeText('ERROR: Uncommon expression', 'error-msg', 30);
                    }
                }
                break;

            case 'surf':
            case '/surf':
                if (args.length === 0) {
                    await typeText('ERROR: Введите поисковый запрос (for example: /surf Москва)', 'error-msg', 30);
                } else {
                    const query = args.join(' ');
                    await typeText(`SEARCH BY WIKIPEDIA: "${query}"...`, 'system-msg', 30);

                    try {
                        const response = await fetch(
                            `https://ru.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`
                        );

                        if (!response.ok) {
                            throw new Error('Article not found');
                        }

                        const data = await response.json();

                        if (data && data.extract) {
                            let articleText = data.extract;
                            if (articleText.length > 800) {
                                articleText = articleText.substring(0, 800) + '...';
                            }

                            await typeText(' ' + data.title || 'Без названия', 'welcome', 20);
                            await typeText(articleText, 'command-output', 15);
                            await typeText(`\nСсылка: ${data.content_urls?.desktop?.page || 'недоступна'}`, 'system-msg', 25);
                        } else {
                            await typeText('ERROR: Article not found', 'error-msg', 30);
                        }
                    } catch(error) {
                        await typeText(`ERROR: ${error.message}`, 'error-msg', 30);
                    }
                }
                break;

            case 'matrix':
            case '/matrix':
                await typeText('ЗАПУСК MATRIX...', 'system-msg', 50);
                await typeText('ВНИМАНИЕ: Этот эффект работает только в консоли разработчика!', 'system-msg', 30);
                await typeText('Откройте F12 -> Console и введите: startMatrix()', 'system-msg', 30);
                window.startMatrix = function() {
                    console.log('%cMATRIX ACTIVATED', 'font-size: 20px; color: #00ff00;');
                    console.log('%cС каждый шагом я удивляюсь тебе все больше...', 'color: #00ff00;');
                };
                break;

            case 'exit':
            case '/exit':
                await typeText('СЕАНС ЗАВЕРШЁН. ДО СВИДАНИЯ.', 'welcome', 40);
                await typeText('НАЖМИТЕ F5 ДЛЯ ПЕРЕЗАПУСКА', 'system-msg', 30);
                inputField.disabled = true;
                break;

            default:
                await typeText(`ОШИБКА: Команда "${command}" не найдена. Введите /help`, 'error-msg', 30);
        }
    }

    async function bootTerminal() {
        await typeText('', '', 0);
        await typeText('═══════════════════════════════════════════════', 'system-msg', 10);
        await typeText('  ARPA-NET TERMINAL v.2.1', 'welcome', 50);
        await typeText('  (c) 1984 DEFENSE ADVANCED RESEARCH PROJECTS', 'system-msg', 20);
        await typeText('═══════════════════════════════════════════════', 'system-msg', 10);
        await typeText('', '', 0);

        await typeText('> ПОДКЛЮЧЕНИЕ К СЕРВЕРУ УСТАНОВЛЕНО...', 'system-msg', 40);
        await typeText('> ИНИЦИАЛИЗАЦИЯ ПРОТОКОЛОВ...', 'system-msg', 30);
        await typeText('> СТАТУС: ОНЛАЙН', 'system-msg', 25);
        await typeText('', '', 0);
        await typeText('ДОБРО ПОЖАЛОВАТЬ В СИСТЕМУ.', 'welcome', 40);
        await typeText('ВВЕДИТЕ /help ДЛЯ СПИСКА КОМАНД.', 'system-msg', 30);
        await typeText('', '', 0);

        inputField.focus();
    }

    inputField.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = inputField.value;
            inputField.value = '';
            await handleCommand(cmd);
            inputField.focus();
            terminal.scrollTop = terminal.scrollHeight;
        }

        if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (commandHistory.length > 0) {
                if (historyIndex > 0) {
                    historyIndex--;
                }
                inputField.value = commandHistory[historyIndex] || '';
                inputField.selectionStart = inputField.selectionEnd = inputField.value.length;
            }
        }

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                inputField.value = commandHistory[historyIndex] || '';
            } else {
                historyIndex = commandHistory.length;
                inputField.value = '';
            }
        }
    });

    document.getElementById('terminal').addEventListener('click', () => {
        inputField.focus();
    });

    bootTerminal();
</script>

</body>
</html>
